<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="batteryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E3A8A" />
      <stop offset="100%" stop-color="#1D4ED8" />
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F97316" />
      <stop offset="100%" stop-color="#EA580C" />
    </linearGradient>
  </defs>
  
  <!-- Outer rings -->
  <circle cx="200" cy="200" r="160" fill="none" stroke="#F0F4FF" stroke-width="8" />
  <circle cx="200" cy="200" r="140" fill="none" stroke="#E2E8F0" stroke-width="2" stroke-dasharray="8,6" />
  
  <!-- Sun Rays background -->
  <g stroke="#F97316" stroke-width="2" opacity="0.3" stroke-linecap="round">
    <line x1="200" y1="20" x2="200" y2="40" />
    <line x1="200" y1="360" x2="200" y2="380" />
    <line x1="20" y1="200" x2="40" y2="200" />
    <line x1="360" y1="200" x2="380" y2="200" />
    <line x1="73" y1="73" x2="87" y2="87" />
    <line x1="313" y1="313" x2="327" y2="327" />
    <line x1="73" y1="327" x2="87" y2="313" />
    <line x1="313" y1="73" x2="327" y2="87" />
  </g>

  <!-- Battery Shell -->
  <g transform="translate(130, 80)">
    <!-- Battery cap -->
    <rect x="50" y="0" width="40" height="12" rx="3" fill="#1E3A8A" />
    <!-- Outer glass case -->
    <rect x="10" y="12" width="120" height="230" rx="16" fill="url(#batteryGrad)" stroke="#F0F4FF" stroke-width="6" filter="drop-shadow(0 10px 15px rgba(30, 58, 138, 0.3))" />
    
    <!-- Inner charges with filling height animations -->
    <g transform="translate(25, 28)">
      <!-- Bar 4 (top) -->
      <rect x="0" y="12" width="90" height="36" rx="6" fill="#F97316" class="battery-bar-4" />
      <!-- Bar 3 -->
      <rect x="0" y="60" width="90" height="36" rx="6" fill="#FB923C" class="battery-bar-3" />
      <!-- Bar 2 -->
      <rect x="0" y="108" width="90" height="36" rx="6" fill="#22C55E" class="battery-bar-2" />
      <!-- Bar 1 (bottom) -->
      <rect x="0" y="156" width="90" height="36" rx="6" fill="#16A34A" class="battery-bar-1" />
    </g>
  </g>
  
  <!-- Glowing power bolt on the side -->
  <path d="M300 160 L280 210 H310 L290 270 L340 190 H310 Z" fill="url(#glowGrad)" filter="drop-shadow(0 0 8px rgba(249, 115, 22, 0.6))" />
</svg>
