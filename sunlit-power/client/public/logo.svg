    <!-- Level 1 (dist = 1) -->
    <circle cx="35" cy="21.5" r="4.0" />
    <circle cx="35" cy="38.5" r="4.0" />
    <circle cx="43.5" cy="30" r="4.0" />
    <circle cx="26.5" cy="30" r="4.0" />
    <circle cx="43.5" cy="21.5" r="4.0" />
    <circle cx="26.5" cy="21.5" r="4.0" />
    <circle cx="43.5" cy="38.5" r="4.0" />
    <circle cx="26.5" cy="38.5" r="4.0" />
    
    <!-- Level 2 (dist = 2) -->
    <circle cx="35" cy="13" r="3.0" />
    <circle cx="35" cy="47" r="3.0" />
    <circle cx="52" cy="30" r="3.0" />
    <circle cx="18" cy="30" r="3.0" />
    <circle cx="52" cy="21.5" r="3.0" />
    <circle cx="18" cy="21.5" r="3.0" />
