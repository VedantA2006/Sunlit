    <circle cx="43.5" cy="47" r="3.0" />
    <circle cx="26.5" cy="47" r="3.0" />
    
    <!-- Level 3 (dist = 3 - outer tips) -->
    <circle cx="35" cy="4.5" r="1.8" />
    <circle cx="35" cy="55.5" r="1.8" />
    <circle cx="60.5" cy="30" r="1.8" />
    <circle cx="9.5" cy="30" r="1.8" />
