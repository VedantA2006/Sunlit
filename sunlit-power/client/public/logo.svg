  <!-- Arenq Blue Wordmark -->
  <text x="76" y="37" font-family="'Inter', -apple-system, BlinkMacSystemFont, sans-serif" font-weight="900" font-style="italic" font-size="30" fill="#0d558d" letter-spacing="-0.5">ARENQ</text>
  
  <!-- Sub-caption -->
  <text x="78" y="50" font-family="'Inter', -apple-system, BlinkMacSystemFont, sans-serif" font-weight="600" font-size="8.5" fill="#64748B" letter-spacing="1">SERVICE &amp; COMPLAINT PORTAL</text>
